<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монгол Бичиг — Үйл ажиллагаа</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #d4af37;
            --bg: #0a0a0a;
            --card-bg: #151515;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            padding-top: 120px; /* Шинэ Header (56px) + Scoreboard зай */
            overflow-x: hidden;
        }

        /* --- ШИНЭЧЛЭГДСЭН HEADER --- */
        #site-header {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--primary); z-index: 9999;
        }
        #site-header .nav-inner {
            position: relative; display: flex; align-items: center; height: 56px; max-width: 1200px; margin: 0 auto;
        }
        #site-header nav {
            display: flex; justify-content: center; align-items: center; width: 100%; height: 56px;
            overflow-x: auto; scrollbar-width: none; padding: 0 20px;
        }
        #site-header nav::-webkit-scrollbar { display: none; }
        #site-header nav a {
            color: #ccc; text-decoration: none; font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.8px; padding: 6px 14px;
            border-radius: 6px; white-space: nowrap; flex-shrink: 0; transition: 0.2s;
        }
        #site-header nav a:hover { color: var(--primary); background: rgba(212,175,55,0.08); }
        #site-header nav a.active { color: var(--primary); border-bottom: 2px solid var(--primary); border-radius: 0; }

        /* Burger Menu */
        #nav-burger {
            display: none; position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; padding: 6px; flex-direction: column; gap: 5px;
        }
        #nav-burger span { display: block; width: 24px; height: 2px; background: var(--primary); border-radius: 2px; transition: 0.3s; }
        
        #site-header.menu-open #nav-burger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        #site-header.menu-open #nav-burger span:nth-child(2) { opacity: 0; }
        #site-header.menu-open #nav-burger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* Mobile Drawer */
        #nav-drawer {
            display: none; flex-direction: column; background: rgba(0,0,0,0.97);
            border-top: 1px solid rgba(212,175,55,0.2); overflow: hidden; max-height: 0; transition: max-height 0.35s ease;
        }
        #site-header.menu-open #nav-drawer { max-height: 600px; }
        #nav-drawer a {
            color: #ccc; text-decoration: none; font-size: 13px; font-weight: 600;
            text-transform: uppercase; padding: 15px 28px; border-left: 3px solid transparent; transition: 0.2s;
        }
        #nav-drawer a.active { color: var(--primary); border-left-color: var(--primary); background: rgba(212,175,55,0.08); }

        @media(max-width:992px) {
            #site-header nav { display: none; }
            #nav-burger { display: flex; }
            #nav-drawer { display: flex; }
        }

        /* --- SCOREBOARD --- */
        .scoreboard-container {
            position: fixed; top: 56px; left: 0; width: 100%; z-index: 999;
            background: linear-gradient(180deg, #000 0%, transparent 100%); padding: 10px 0;
        }
        .scoreboard {
            max-width: 500px; margin: 0 auto; background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 50px; padding: 8px 25px; display: flex; justify-content: space-between; align-items: center;
        }
        .stat { display: flex; align-items: center; gap: 8px; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; color: var(--primary); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; text-align: center; }
        .main-title { font-size: 1.8rem; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px; }
        .levels-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); padding: 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); transition: var(--transition); }
        .card.unlocked:hover { transform: translateY(-10px); border-color: var(--primary); cursor: pointer; }
        .card.locked { opacity: 0.3; filter: grayscale(1); }
        .level-icon { font-size: 3rem; color: var(--primary); margin-bottom: 15px; display: block; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.97); display: none; justify-content: center; align-items: center; z-index: 11000; }
        .modal.active { display: flex; }
        .modal-content { background: #111; border: 1px solid var(--primary); padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; position: relative; text-align: center; }
        .card-timer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 5px 25px; border-radius: 20px; font-weight: 900; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(212,175,55,0.4); }
        .mongol-text { font-size: 5rem; writing-mode: vertical-lr; height: 180px; margin: 20px auto; color: var(--primary); }
        .game-btn { background: #222; color: #fff; padding: 15px; border: 1px solid rgba(212,175,55,0.2); border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        .game-btn:hover { background: var(--primary); color: #000; }
        @keyframes urgentPulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.1); background: #ff4d4d; } }
        .urgent { animation: urgentPulse 0.5s infinite; }
    </style>
</head>
<body>

<header id="site-header">
    <div class="nav-inner">
        <nav>
            <a href="index.html">Нүүр хуудас</a>
            <a href="about.html">Тухай</a>
            <a href="portfolio.html">Бүтээлүүд</a>
            <a href="custom.html">Захиалгат</a>
            <a href="courses.html">Хичээлүүд</a>
            <a href="services.html">Үйлчилгээ</a>
            <a href="blog.html">Блог</a>
            <a href="events.html" class="active">Үйл ажиллагаа</a>
            <a href="testimonials.html">Сэтгэгдэл</a>
            <a href="contact.html">Холбоо барих</a>
        </nav>
        <button id="nav-burger" aria-label="Цэс нээх">
            <span></span><span></span><span></span>
        </button>
    </div>
    <div id="nav-drawer">
        <a href="index.html">Нүүр хуудас</a>
        <a href="about.html">Тухай</a>
        <a href="portfolio.html">Бүтээлүүд</a>
        <a href="courses.html">Хичээлүүд</a>
        <a href="events.html" class="active">Үйл ажиллагаа</a>
        <a href="contact.html">Холбоо барих</a>
    </div>
</header>

<div class="scoreboard-container">
    <div class="scoreboard">
        <div class="stat">
            <span class="stat-label">❤️ АМЬ</span>
            <span id="lives-display" class="stat-value">❤️❤️❤️</span>
        </div>
        <div class="stat">
            <span class="stat-label">🏆 ОНОО</span>
            <span id="score" class="stat-value">0</span>
        </div>
    </div>
</div>

<div class="container">
    <h1 class="main-title">Монгол Бичиг Сорил</h1>
    <div class="levels-grid">
        <div class="card unlocked" id="lvl-1" onclick="openLevel(1)">
            <span class="level-icon">ᠠ</span>
            <h3>Анхан шат</h3>
            <p style="color:#666; margin-top:10px;">Эгшиг үсэг таних</p>
        </div>
        <div class="card locked" id="lvl-2" onclick="openLevel(2)">
            <span class="level-icon">ᠪ</span>
            <h3>Дунд шат</h3>
            <p style="color:#666; margin-top:10px;">Гийгүүлэгч үсэг</p>
        </div>
    </div>
</div>

<!-- Modal, Game Logic, Scripts хэсэг хэвээрээ үлдэнэ -->

<div class="modal" id="gameModal">
    <div class="modal-content">
        <div id="card-timer" class="card-timer">30s</div>
        <div id="gameArea"></div>
        <button onclick="closeModal()" style="margin-top:20px; background:none; border:none; color:#444; cursor:pointer;">Тоглоомыг зогсоох</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
    // NAVIGATION LOGIC
    const navBurger = document.getElementById("nav-burger");
    const siteHeader = document.getElementById("site-header");

    navBurger.addEventListener("click", (e) => {
        e.stopPropagation();
        siteHeader.classList.toggle("menu-open");
    });

    document.addEventListener("click", (e) => {
        if (!siteHeader.contains(e.target)) {
            siteHeader.classList.remove("menu-open");
        }
    });
    let score = 0, lives = 3, timeLeft = 30, timer, currentQ = 0, currentLvl = 1, unlockedLvl = 1;

    const questions = {
        1: [
            { q: "Энэ ямар үсэг вэ?", visual: "ᠠ", opts: ["А", "Э", "И"], ans: "А" },
            { q: "Энэ ямар үсэг вэ?", visual: "ᠢ", opts: ["А", "И", "У"], ans: "И" }
        ],
        2: [
            { q: "'Б' үсгийг ол", visual: "ᠪ", opts: ["ᠪ", "ᠮ", "ᠯ"], ans: "ᠪ" }
        ]
    };

    function openLevel(lvl) {
        if (lvl > unlockedLvl) return;
        currentLvl = lvl; lives = 3; currentQ = 0; score = 0;
        document.getElementById('gameModal').classList.add('active');
        updateUI();
        startTimer();
        renderQuestion();
    }

    function renderQuestion() {
        const area = document.getElementById('gameArea');
        const q = questions[currentLvl][currentQ];
        let html = `<p style="color:#555; font-size:12px; letter-spacing:2px; margin-bottom:10px;">АСУУЛТ ${currentQ + 1}</p>`;
        if (q.visual) html += `<div class="mongol-text">${q.visual}</div>`;
        html += `<h3 style="margin-bottom:20px;">${q.q}</h3><div style="display:grid; gap:10px;">`;
        q.opts.forEach(o => html += `<button class="game-btn" onclick="check('${o}')">${o}</button>`);
        html += `</div>`;
        area.innerHTML = html;
    }

    function check(val) {
        if (val === questions[currentLvl][currentQ].ans) {
            score += 100;
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } });
            currentQ++;
            if (currentQ < questions[currentLvl].length) renderQuestion();
            else finishLevel();
        } else {
            lives--;
            if (lives <= 0) { alert("Тоглоом дууслаа!"); closeModal(); }
        }
        updateUI();
    }

    function startTimer() {
        clearInterval(timer);
        timeLeft = 30;
        const timerEl = document.getElementById('card-timer');
        timerEl.classList.remove('urgent');
        timer = setInterval(() => {
            timeLeft--;
            timerEl.innerText = `${timeLeft}s`;
            if (timeLeft <= 10) timerEl.classList.add('urgent');
            if (timeLeft <= 0) { clearInterval(timer); alert("Хугацаа дууслаа!"); closeModal(); }
        }, 1000);
    }

    function finishLevel() {
        clearInterval(timer);
        if (currentLvl === unlockedLvl && unlockedLvl < 2) {
            unlockedLvl++;
            document.getElementById(`lvl-${unlockedLvl}`).classList.replace('locked', 'unlocked');
        }
        document.getElementById('gameArea').innerHTML = `<div style="font-size:4rem;">🏆</div><h2>Гайхалтай!</h2><button class="game-btn" onclick="closeModal()" style="background:var(--primary); color:#000;">Дараагийн шат</button>`;
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('lives-display').innerText = "❤️".repeat(lives);
    }

    function closeModal() {
        clearInterval(timer);
        document.getElementById('gameModal').classList.remove('active');
    }
</script>

</body>
</html>
